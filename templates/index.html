<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Расписание занятий</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Roboto', sans-serif; margin:0; padding:0; background: #f0f4f8; }
header { background: #005ea3; color:white; padding:20px; text-align:center; }
h1 { margin:0; font-weight:700; }
.container { display:flex; }
.sidebar {
    width:220px; padding:20px; background:#e0f0ff; border-right:1px solid #ccc; box-sizing: border-box;
}
.sidebar h2 { margin-top:0; font-size:18px; }
.button {
    display:block; width:100%; margin:8px 0; padding:12px 6px; text-align:center;
    border-radius:25px; background:#005ea3; color:white; font-weight:700; text-decoration:none;
    box-shadow:0 4px 6px rgba(0,0,0,0.15); transition:0.3s;
    white-space: normal; word-wrap: break-word; overflow-wrap: break-word;
    font-size:14px; line-height:1.3; box-sizing:border-box;
}
.button:hover { background:#004377; }
.schedule-area { flex:1; padding:20px; display:flex; overflow-x:auto; gap:15px; }
.day-column {
    background:white; border-radius:10px; padding:10px; min-width:160px; display:flex; flex-direction:column;
}
.day-column h3 { text-align:center; margin:0 0 10px 0; }
.class-card {
    background:white; border:1px solid #000; border-radius:20px; margin-bottom:10px;
    padding:10px; text-align:center; box-shadow:0 6px 10px rgba(0,0,0,0.1); transition:all 0.3s;
}
.class-card:hover { transform: translateY(-3px); box-shadow: 0 8px 14px rgba(0,0,0,0.15); }
.class-card .subject { font-weight:700; }
.class-card .teacher { font-size:14px; margin-top:4px; }

/* Адаптация для мобильных */
@media screen and (max-width: 768px) {
    .container { flex-direction: column; }
    .sidebar { width:100%; display:flex; flex-wrap: wrap; justify-content:center; padding:10px; }
    .button { width: 45%; margin:5px; font-size:13px; padding:10px 5px; }
    .schedule-area { flex-direction: column; overflow-x: visible; gap:10px; }
    .day-column { min-width: 100%; max-width: 100%; margin-bottom:15px; }
    .class-card { font-size:12px; padding:6px; word-wrap:break-word; }
}
</style>
</head>
<body>
<header>
<h1>Расписание занятий</h1>
<div style="font-size:14px;">Всего групп: {{ groups|length }}</div>
</header>
<div class="container">
<div class="sidebar">
<h2>Группы</h2>
{% for g in groups %}
<a href="#" class="button group-btn" data-group="{{g}}">{{ g }}</a>
{% endfor %}
<a href="#" class="button" id="regen-btn">Перегенерировать расписание</a>
</div>
<div class="schedule-area" id="schedule"></div>
</div>
<script>
let currentGroup = "{{ groups[0] }}";
let days = ["Понедельник","Вторник","Среда","Четверг","Пятница"];
function getCardColor(subject){
    const prog = ["HTML-CSS-JS","Разработка модулей","Разработка мобильных приложений","Тестирование","C++","Поддержка комп.систем","Обеспечение качества"];
    const design = ["Многостраничный дизайн","Дизайн упаковки","Maya 3D","Zbrush","Adobe Premier","Сборка дизайна","Основы рисунка","Дизайн интерьера","ТЗ на графический дизайн","Дизайн-проектирование"];
    const common = ["Математика","Физика","Информатика","Литература","Химия","Русский","Английский","История","Физ-ра","География","Биология","Обществознание"];
    if(prog.includes(subject)) return "#d0eaff";
    if(design.includes(subject)) return "#ffe0e6";
    if(common.includes(subject)) return "#e0ffe0";
    if(subject=="Выходной") return "#f2f2f2";
    return "#ffffff";
}
function loadSchedule(group, regen=false){
    let url = regen ? `/generate/${group}` : `/schedule/${group}`;
    fetch(url).then(res=>res.json()).then(data=>{
        const container = document.getElementById("schedule");
        container.innerHTML = "";
        days.forEach(day=>{
            let col = document.createElement("div");
            col.className="day-column";
            let dayTitle = document.createElement("h3");
            dayTitle.textContent = day;
            col.appendChild(dayTitle);
            if(data[day] && data[day].length>0){
                data[day].forEach(c=>{
                    let card = document.createElement("div");
                    card.className="class-card";
                    card.style.background = getCardColor(c.subject);
                    card.innerHTML=`<div class="subject">${c.subject}</div><div class="teacher">${c.teacher}</div>`;
                    col.appendChild(card);
                });
            } else {
                for(let i=0;i<5;i++){
                    let card = document.createElement("div");
                    card.className="class-card";
                    card.style.background = getCardColor("Выходной");
                    card.innerHTML=`<div class="subject">Выходной</div><div class="teacher"></div>`;
                    col.appendChild(card);
                }
            }
            container.appendChild(col);
        });
    });
}
document.querySelectorAll(".group-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        currentGroup = btn.dataset.group;
        loadSchedule(currentGroup);
    });
});
document.getElementById("regen-btn").addEventListener("click", ()=>{
    loadSchedule(currentGroup,true);
});
loadSchedule(currentGroup);
</script>
</body>
</html>
